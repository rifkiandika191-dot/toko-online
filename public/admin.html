<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - KARYABARU</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

  <!-- ===== LOGIN ===== -->
  <div id="login-view" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl p-8">
      <div class="text-center mb-6">
        <div class="mx-auto w-14 h-14 rounded-2xl bg-indigo-600 text-white flex items-center justify-center text-2xl mb-3">
          <i class="fas fa-gem"></i>
        </div>
        <h1 class="text-xl font-black">Admin KARYABARU</h1>
        <p class="text-sm text-slate-500">Masuk untuk kelola produk</p>
      </div>
      <input id="password" type="password" placeholder="Password admin"
        class="w-full px-4 py-3 border rounded-xl mb-3 focus:ring-2 focus:ring-indigo-500"
        onkeydown="if(event.key==='Enter') login()" />
      <button onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
        Masuk
      </button>
      <p id="login-error" class="text-red-500 text-sm mt-3 text-center hidden"></p>
      <a href="index.html" class="block text-center text-sm text-slate-400 mt-4 hover:text-indigo-600">&larr; Kembali ke toko</a>
    </div>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <div id="app-view" class="hidden">
    <header class="bg-indigo-700 text-white">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <h1 class="font-black text-lg"><i class="fas fa-gem mr-2"></i>Admin KARYABARU</h1>
        <div class="flex items-center gap-3">
          <a href="index.html" target="_blank" class="text-sm bg-white/15 px-4 py-2 rounded-full hover:bg-white/25">Lihat Toko</a>
          <button onclick="logout()" class="text-sm bg-white/15 px-4 py-2 rounded-full hover:bg-white/25">Keluar</button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-black">Daftar Produk</h2>
        <button onclick="openForm()" class="bg-indigo-600 text-white px-5 py-3 rounded-xl font-bold hover:bg-indigo-700">
          <i class="fas fa-plus mr-2"></i>Tambah Produk
        </button>
      </div>

      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-500 text-left">
            <tr>
              <th class="px-4 py-3">Foto</th>
              <th class="px-4 py-3">Nama</th>
              <th class="px-4 py-3">Kategori</th>
              <th class="px-4 py-3">Harga</th>
              <th class="px-4 py-3">Stok</th>
              <th class="px-4 py-3">Aktif</th>
              <th class="px-4 py-3 text-right">Aksi</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <p id="empty" class="hidden text-center text-slate-400 py-10">Belum ada produk.</p>
      </div>
    </main>
  </div>

  <!-- ===== MODAL FORM ===== -->
  <div id="form-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between px-6 py-4 border-b sticky top-0 bg-white">
        <h3 id="form-title" class="font-black text-lg">Tambah Produk</h3>
        <button onclick="closeForm()" class="text-slate-400 hover:text-slate-700"><i class="fas fa-times text-xl"></i></button>
      </div>
      <div class="p-6 space-y-3">
        <input type="hidden" id="f-id" />
        <div>
          <label class="text-xs font-bold text-slate-500">Nama produk *</label>
          <input id="f-name" class="w-full px-3 py-2 border rounded-lg mt-1" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-bold text-slate-500">Kategori *</label>
            <input id="f-category" list="cat-list" class="w-full px-3 py-2 border rounded-lg mt-1" placeholder="Cincin / Gelang / Kalung Sultan" />
            <datalist id="cat-list">
              <option value="Cincin"></option><option value="Gelang"></option>
              <option value="Kalung Sultan"></option><option value="Gelang Borobudur"></option>
            </datalist>
          </div>
          <div>
            <label class="text-xs font-bold text-slate-500">Harga (Rp)</label>
            <input id="f-price" type="number" min="0" class="w-full px-3 py-2 border rounded-lg mt-1" />
          </div>
        </div>
        <div>
          <label class="text-xs font-bold text-slate-500">Gambar (pisahkan dengan koma)</label>
          <input id="f-images" class="w-full px-3 py-2 border rounded-lg mt-1" placeholder="img/foto1.png, img/foto2.png" />
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="text-xs font-bold text-slate-500">Karat</label>
            <input id="f-karat" class="w-full px-3 py-2 border rounded-lg mt-1" placeholder="700" />
          </div>
          <div>
            <label class="text-xs font-bold text-slate-500">Berat</label>
            <input id="f-berat" class="w-full px-3 py-2 border rounded-lg mt-1" placeholder="5 gram" />
          </div>
          <div>
            <label class="text-xs font-bold text-slate-500">Ukuran</label>
            <input id="f-size" class="w-full px-3 py-2 border rounded-lg mt-1" placeholder="15" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-bold text-slate-500">Stok</label>
            <input id="f-stock" type="number" min="0" class="w-full px-3 py-2 border rounded-lg mt-1" value="0" />
          </div>
          <div class="flex items-end pb-2">
            <label class="flex items-center gap-2 text-sm font-bold text-slate-600">
              <input id="f-active" type="checkbox" checked class="w-4 h-4" /> Tampilkan di toko
            </label>
          </div>
        </div>
        <div>
          <label class="text-xs font-bold text-slate-500">Deskripsi</label>
          <textarea id="f-description" rows="3" class="w-full px-3 py-2 border rounded-lg mt-1"></textarea>
        </div>
        <p id="form-error" class="text-red-500 text-sm hidden"></p>
      </div>
      <div class="px-6 py-4 border-t flex justify-end gap-3 sticky bottom-0 bg-white">
        <button onclick="closeForm()" class="px-5 py-2.5 rounded-lg border font-bold text-slate-600">Batal</button>
        <button onclick="saveProduct()" class="px-5 py-2.5 rounded-lg bg-indigo-600 text-white font-bold hover:bg-indigo-700">Simpan</button>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = 'admin_token_karyabaru';
    let token = localStorage.getItem(TOKEN_KEY) || '';

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
    }

    async function login() {
      const password = document.getElementById('password').value;
      const err = document.getElementById('login-error');
      err.classList.add('hidden');
      try {
        const r = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (!r.ok) throw new Error('Password salah');
        const data = await r.json();
        token = data.token;
        localStorage.setItem(TOKEN_KEY, token);
        showApp();
      } catch (e) {
        err.textContent = e.message;
        err.classList.remove('hidden');
      }
    }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      token = '';
      document.getElementById('app-view').classList.add('hidden');
      document.getElementById('login-view').classList.remove('hidden');
    }

    function showApp() {
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('app-view').classList.remove('hidden');
      loadProducts();
    }

    async function loadProducts() {
      const r = await fetch('/api/admin/products', { headers: authHeaders() });
      if (r.status === 401) return logout();
      const products = await r.json();
      const tbody = document.getElementById('rows');
      const empty = document.getElementById('empty');
      tbody.innerHTML = '';
      empty.classList.toggle('hidden', products.length > 0);
      for (const p of products) {
        const img = (p.images && p.images[0]) ? p.images[0] : '';
        const tr = document.createElement('tr');
        tr.className = 'border-t';
        tr.innerHTML = `
          <td class="px-4 py-3"><img src="${img}" onerror="this.style.visibility='hidden'" class="w-12 h-12 object-cover rounded-lg bg-slate-100"></td>
          <td class="px-4 py-3 font-semibold">${escapeHtml(p.name)}</td>
          <td class="px-4 py-3 text-slate-500">${escapeHtml(p.category)}</td>
          <td class="px-4 py-3">Rp ${Number(p.price).toLocaleString('id-ID')}</td>
          <td class="px-4 py-3">${p.stock}</td>
          <td class="px-4 py-3">${p.active ? '<span class="text-green-600">●</span>' : '<span class="text-slate-300">●</span>'}</td>
          <td class="px-4 py-3 text-right whitespace-nowrap">
            <button class="text-indigo-600 hover:underline mr-3">Edit</button>
            <button class="text-red-500 hover:underline">Hapus</button>
          </td>`;
        tr.querySelector('.text-indigo-600').onclick = () => openForm(p);
        tr.querySelector('.text-red-500').onclick = () => removeProduct(p.id, p.name);
        tbody.appendChild(tr);
      }
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    function openForm(p) {
      document.getElementById('form-error').classList.add('hidden');
      document.getElementById('form-title').textContent = p ? 'Edit Produk' : 'Tambah Produk';
      document.getElementById('f-id').value = p ? p.id : '';
      document.getElementById('f-name').value = p ? p.name : '';
      document.getElementById('f-category').value = p ? p.category : '';
      document.getElementById('f-price').value = p ? p.price : '';
      document.getElementById('f-images').value = p ? (p.images || []).join(', ') : '';
      document.getElementById('f-karat').value = p ? (p.karat || '') : '';
      document.getElementById('f-berat').value = p ? (p.berat || '') : '';
      document.getElementById('f-size').value = p ? (p.size || '') : '';
      document.getElementById('f-stock').value = p ? p.stock : 0;
      document.getElementById('f-active').checked = p ? !!p.active : true;
      document.getElementById('f-description').value = p ? (p.description || '') : '';
      document.getElementById('form-modal').classList.remove('hidden');
    }

    function closeForm() {
      document.getElementById('form-modal').classList.add('hidden');
    }

    async function saveProduct() {
      const id = document.getElementById('f-id').value;
      const body = {
        name: document.getElementById('f-name').value,
        category: document.getElementById('f-category').value,
        price: document.getElementById('f-price').value,
        images: document.getElementById('f-images').value,
        emas: document.getElementById('f-karat').value, // emas = karat
        karat: document.getElementById('f-karat').value,
        berat: document.getElementById('f-berat').value,
        size: document.getElementById('f-size').value,
        stock: document.getElementById('f-stock').value,
        active: document.getElementById('f-active').checked,
        description: document.getElementById('f-description').value,
      };
      const err = document.getElementById('form-error');
      err.classList.add('hidden');
      if (!body.name || !body.category) {
        err.textContent = 'Nama dan kategori wajib diisi.';
        err.classList.remove('hidden');
        return;
      }
      const url = id ? '/api/products/' + id : '/api/products';
      const method = id ? 'PUT' : 'POST';
      const r = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
      if (r.status === 401) return logout();
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        err.textContent = d.error || 'Gagal menyimpan.';
        err.classList.remove('hidden');
        return;
      }
      closeForm();
      loadProducts();
    }

    async function removeProduct(id, name) {
      if (!confirm('Hapus produk "' + name + '"?')) return;
      const r = await fetch('/api/products/' + id, { method: 'DELETE', headers: authHeaders() });
      if (r.status === 401) return logout();
      loadProducts();
    }

    // Auto masuk kalau token masih ada
    if (token) showApp();
  </script>
</body>
</html>
