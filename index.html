<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARYABARU - Katalog Perhiasan & Logam Mulia</title>
    <!-- Framework & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 20s linear infinite;
            white-space: nowrap;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- 1. LIVE GOLD PRICE TICKER -->
    <div class="bg-yellow-500 text-yellow-950 py-1.5 overflow-hidden border-b border-yellow-600 shadow-sm sticky top-0 z-[60]">
        <div class="container mx-auto px-4 flex items-center">
            <span class="bg-yellow-800 text-white text-[10px] font-bold px-2 py-0.5 rounded mr-3 z-10 shadow-sm">LIVE</span>
            <div class="flex-1 overflow-hidden">
                <p id="gold-ticker" class="text-sm font-bold animate-marquee">
                    Menghubungkan ke Gold-API untuk mengambil harga emas dunia terbaru...
                </p>
            </div>
        </div>
    </div>

    <!-- 2. NAVBAR -->
    <nav class="bg-indigo-900 text-white shadow-md sticky top-[36px] z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="filterProduct('Semua')">
                <i class="fas fa-gem text-yellow-400 text-2xl"></i>
                <span class="text-xl font-black tracking-tighter uppercase">KARYA<span class="text-yellow-400">BARU</span></span>
            </div>
            
            <button onclick="toggleCart()" class="relative p-2.5 bg-indigo-800 hover:bg-indigo-700 rounded-full transition">
                <i class="fas fa-shopping-bag text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-indigo-900">0</span>
            </button>
        </div>
    </nav>

    <!-- 3. KATEGORI -->
    <div class="bg-white border-b sticky top-[88px] z-40">
        <div class="container mx-auto px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar">
            <button onclick="filterProduct('Semua')" class="cat-btn flex-none px-6 py-2 rounded-full bg-indigo-600 text-white text-sm font-bold shadow-md">Semua</button>
            <button onclick="filterProduct('Kalung')" class="cat-btn flex-none px-6 py-2 rounded-full bg-gray-100 text-gray-600 text-sm font-bold hover:bg-indigo-50">Kalung</button>
            <button onclick="filterProduct('Cincin')" class="cat-btn flex-none px-6 py-2 rounded-full bg-gray-100 text-gray-600 text-sm font-bold hover:bg-indigo-50">Cincin</button>
            <button onclick="filterProduct('Anting')" class="cat-btn flex-none px-6 py-2 rounded-full bg-gray-100 text-gray-600 text-sm font-bold hover:bg-indigo-50">Anting</button>
            <button onclick="filterProduct('Kalung Sultan')" class="cat-btn flex-none px-6 py-2 rounded-full bg-gray-100 text-gray-600 text-sm font-bold hover:bg-indigo-50">Kalung Sultan</button>

        </div>
    </div>

    <!-- 4. DAFTAR PRODUK -->
    <main class="container mx-auto px-4 py-8">
        <div id="product-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
            <!-- Render via JavaScript -->
        </div>
    </main>

    <!-- 5. MEDIA SOSIAL -->
    <section class="bg-white border-t border-gray-200">
        <div class="container mx-auto px-4 py-10 text-center">
            <h2 class="text-2xl font-black text-gray-900 mb-4">Ikuti Kami</h2>
            <p class="text-gray-600 mb-6">Dapatkan update produk terbaru, promo, dan layanan terbaik dari KARYA BARU.</p>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="https://wa.me/628111317166" target="_blank" class="flex items-center gap-3 px-5 py-3 rounded-full border border-green-500 text-green-600 hover:bg-green-50 transition">
                    <i class="fab fa-whatsapp text-xl"></i>
                    <span>WhatsApp</span>
                </a>
                <a href="https://instagram.com/tokoemas_karyabaru" target="_blank" class="flex items-center gap-3 px-5 py-3 rounded-full border border-pink-500 text-pink-600 hover:bg-pink-50 transition">
                    <i class="fab fa-instagram text-xl"></i>
                    <span>Instagram</span>
                </a>
                <a href="https://www.tiktok.com/@tk.emaskaryabarugowa" target="_blank" class="flex items-center gap-3 px-5 py-3 rounded-full border border-black text-black hover:bg-gray-100 transition">
                    <i class="fab fa-tiktok text-xl"></i>
                    <span>TikTok</span>
                </a>
                </a>
            </div>
        </div>
    </section>

    <!-- 6. MODAL DETAIL PRODUK -->
    <div id="detail-modal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl relative">
            <button onclick="closeDetail()" class="absolute top-4 right-4 bg-white/90 text-gray-800 w-10 h-10 rounded-full flex items-center justify-center text-2xl z-10 shadow-lg">&times;</button>
            <img id="detail-img" src="" class="w-full h-72 object-cover">
            <div class="p-6">
                <span id="detail-cat" class="text-indigo-600 text-xs font-bold uppercase tracking-widest"></span>
                <h3 id="detail-title" class="text-2xl font-black text-gray-800 mt-1"></h3>
                <p id="detail-price" class="text-2xl font-bold text-indigo-700 mt-2"></p>
                <div class="my-4 border-t border-gray-100 pt-4">
                    <p class="text-gray-600 text-sm leading-relaxed" id="detail-desc"></p>
                </div>
                <button id="detail-add-btn" class="w-full bg-gray-900 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold transition flex items-center justify-center gap-3 shadow-lg">
                    <i class="fas fa-cart-plus"></i> Tambahkan ke Keranjang
                </button>
            </div>
        </div>
    </div>

    <!-- 6. MODAL KERANJANG -->
    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-[110] hidden flex justify-end">
        <div class="w-full max-w-md bg-white h-full flex flex-col shadow-2xl">
            <div class="p-5 bg-indigo-900 text-white flex justify-between items-center">
                <h3 class="font-bold text-xl flex items-center gap-2"><i class="fas fa-shopping-cart text-yellow-400"></i> Keranjang</h3>
                <button onclick="toggleCart()" class="text-3xl">&times;</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
                <!-- Item masuk ke sini -->
            </div>
            <div class="p-6 border-t bg-white">
                <div class="flex justify-between text-2xl font-black mb-6">
                    <span class="text-gray-600">Total:</span>
                    <span id="cart-total" class="text-indigo-800 text-3xl">Rp 0</span>
                </div>
                <button onclick="sendToWhatsApp()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 shadow-xl transition-all">
                    <i class="fab fa-whatsapp text-2xl"></i> Pesan via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        /** --- 1. HARGA EMAS REAL-TIME --- **/
        async function fetchGoldPrice() {
            const ticker = document.getElementById('gold-ticker');
            try {
                const response = await fetch('https://api.gold-api.com/price/XAU');
                const data = await response.json();
                
                const priceUsdOunce = data.price; 
                const usdToIdr = 17700; // Kurs estimasi USD ke IDR
                const ounceToGram = 31.1035; 

                const priceIdrGram = (priceUsdOunce / ounceToGram) * usdToIdr;
                const formattedPrice = Math.round(priceIdrGram).toLocaleString('id-ID');

                ticker.innerHTML = `Harga Emas Real-time Hari Ini: <span class="font-black text-white bg-yellow-800 px-2 rounded">Rp ${formattedPrice}/gram</span> • Update otomatis setiap 60 detik • Dapatkan penawaran terbaik hari ini hanya di KARYA BARU ! &nbsp;&nbsp;&nbsp;&nbsp;`;
            } catch (error) {
                ticker.innerText = "Gagal memuat harga emas. Silakan periksa koneksi internet Anda.";
            }
        }
        fetchGoldPrice();
        setInterval(fetchGoldPrice, 60000);

        /** --- 2. DATA PRODUK --- **/
        const products = [
            { 
                id: 1, category: "Kalung Sultan", name: "Kalung Sultan Kupu-Kupu 25 gram", price: 50000000, image: "img/kupukupu.png",
                description: "Kalung Sultan dengan desain kupu-kupu mewah dan detail ukiran emas yang halus. Cocok untuk acara istimewa Emas 700 dengan berat 25 gram"
            },
                        { 
                id: 2, category: "Kalung Sultan", name: "Kalung Sultan 23,7 gram", price: 28440000, image: "img/kalungsultan.png",
                description: "Kalung Sultan dengan desain mewah dan detail ukiran emas yang halus. Cocok untuk acara istimewa Emas 420 dengan berat 23,7 gram"
            },
        ];

        let cart = [];

        /** --- 3. LOGIKA CATALOG --- **/
        function renderProducts(cat = 'Semua') {
            const list = document.getElementById('product-list');
            const filtered = cat === 'Semua' ? products : products.filter(p => p.category === cat);

            list.innerHTML = filtered.map(p => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-all duration-300 group">
                    <div class="relative overflow-hidden aspect-square cursor-pointer" onclick="openDetail(${p.id})">
                        <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <span class="bg-white text-gray-800 px-4 py-2 rounded-full font-bold text-xs shadow-lg">Lihat Detail</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <p class="text-[10px] text-indigo-600 font-black uppercase tracking-widest mb-1">${p.category}</p>
                        <h3 class="font-bold text-gray-800 text-sm md:text-base truncate mb-1">${p.name}</h3>
                        <p class="text-indigo-800 font-black text-lg">Rp ${p.price.toLocaleString('id-ID')}</p>
                        <button onclick="addToCart(${p.id})" class="w-full mt-3 bg-gray-900 text-white py-2.5 rounded-xl text-xs font-bold hover:bg-indigo-700 transition">
                            + Keranjang
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filterProduct(cat) {
            renderProducts(cat);
            document.querySelectorAll('.cat-btn').forEach(btn => {
                if(btn.innerText === cat) {
                    btn.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
                    btn.classList.remove('bg-gray-100', 'text-gray-600');
                } else {
                    btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
                    btn.classList.add('bg-gray-100', 'text-gray-600');
                }
            });
        }

        /** --- 4. LOGIKA DETAIL PRODUK --- **/
        function openDetail(id) {
            const p = products.find(item => item.id === id);
            document.getElementById('detail-img').src = p.image;
            document.getElementById('detail-title').innerText = p.name;
            document.getElementById('detail-price').innerText = `Rp ${p.price.toLocaleString('id-ID')}`;
            document.getElementById('detail-desc').innerText = p.description;
            document.getElementById('detail-cat').innerText = p.category;
            
            document.getElementById('detail-add-btn').onclick = function() {
                addToCart(p.id);
                closeDetail();
            };
            
            document.getElementById('detail-modal').classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeDetail() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        /** --- 5. LOGIKA KERANJANG --- **/
        function addToCart(id) {
            const p = products.find(item => item.id === id);
            cart.push(p);
            updateUI();
            
            // Notifikasi simpel
            const btn = event.currentTarget;
            if(btn.id !== 'detail-add-btn') {
                const originalText = btn.innerText;
                btn.innerText = "✓ Berhasil";
                btn.classList.replace('bg-gray-900', 'bg-green-600');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace('bg-green-600', 'bg-gray-900');
                }, 1000);
            }
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            const totalDiv = document.getElementById('cart-total');
            
            if(cart.length === 0) {
                itemsDiv.innerHTML = `<div class="text-center py-20"><i class="fas fa-shopping-basket text-5xl text-gray-200 mb-4"></i><p class="text-gray-400">Keranjang Kosong</p></div>`;
                totalDiv.innerText = "Rp 0";
                return;
            }

            let total = 0;
            itemsDiv.innerHTML = cart.map((p, i) => {
                total += p.price;
                return `
                <div class="flex gap-4 bg-white p-3 rounded-2xl items-center border border-gray-100 shadow-sm">
                    <img src="${p.image}" class="w-16 h-16 object-cover rounded-xl">
                    <div class="flex-1">
                        <p class="text-xs font-bold text-gray-800">${p.name}</p>
                        <p class="text-sm text-indigo-700 font-black">Rp ${p.price.toLocaleString('id-ID')}</p>
                    </div>
                    <button onclick="remove(${i})" class="text-red-400 hover:text-red-600 p-2"><i class="fas fa-trash-alt"></i></button>
                </div>`;
            }).join('');
            totalDiv.innerText = `Rp ${total.toLocaleString('id-ID')}`;
        }

        function remove(i) {
            cart.splice(i, 1);
            updateUI();
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        /** --- 6. WHATSAPP SENDER --- **/
        function sendToWhatsApp() {
            if (cart.length === 0) return alert("Keranjang belanja masih kosong!");
            
            const WA_NUMBER = "628111317166"; // GANTI DENGAN NOMOR HP KAMU
            let text = "*PESANAN BARU - KARYABARU*\n";
            text += "--------------------------------------\n";
            
            let total = 0;
            cart.forEach((p, i) => {
             const imageUrl = new URL(p.image, document.baseURI).href;
                text += `${i+1}. *${p.name}*\n   Harga: Rp ${p.price.toLocaleString('id-ID')}\n`;
                total += p.price;
            });
            
            text += "--------------------------------------\n";
            text += `*TOTAL PEMBAYARAN: Rp ${total.toLocaleString('id-ID')}*\n\n`;
            text += "Nama Penerima :\nAlamat Lengkap :\nNo. HP :\n*NOTED: HARGA DAPAT BERUBAH SESUAI HARGA EMAS SAAT PEMESANAN*"
            
            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(text)}`, '_blank');
        }

        // Inisialisasi Produk
        renderProducts();
    </script>
</body>
</html>
